version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: paython_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       paython_academy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paython_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:                  5000
      NODE_ENV:              production
      DATABASE_URL:          postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/paython_academy
      FRONTEND_URL:          ${FRONTEND_URL}
      JWT_SECRET:            ${JWT_SECRET}
      JWT_REFRESH_SECRET:    ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN:        15m
      JWT_REFRESH_EXPIRES_IN: 7d
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RESEND_API_KEY:        ${RESEND_API_KEY}
      EMAIL_FROM:            ${EMAIL_FROM}
      ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY}
    ports:
      - '5000:5000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: paython_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL:                ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL:                ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
